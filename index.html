<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Age Calculator</title>
    <meta name="description" content="Calculate your exact age in years, months, and days with our premium glassmorphic Age Calculator tool.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Oi&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-decorations" id="doodles-container">
        <!-- White flowery doodles will be dynamically generated by JS -->
    </div>

    <main class="app-container">
        <header class="app-header">
            <h1>Age Calculator</h1>
            <p class="tagline">Discover your precise lifetime timeline down to the day</p>
        </header>

        <section class="calculator-card">
            <div class="input-group">
                <label for="dob">Select Date of Birth</label>
                <div class="date-input-wrapper">
                    <input type="date" id="dob" required>
                    <span class="custom-calendar-icon"></span>
                </div>
            </div>

            <button id="calculate-btn" class="btn btn-primary">Calculate Age</button>

            <div class="results-container" id="results">
                <div class="result-box">
                    <span class="result-number" id="years">-</span>
                    <span class="result-label">Years</span>
                </div>
                <div class="result-box">
                    <span class="result-number" id="months">-</span>
                    <span class="result-label">Months</span>
                </div>
                <div class="result-box">
                    <span class="result-number" id="days">-</span>
                    <span class="result-label">Days</span>
                </div>
            </div>
            
            <div class="error-message" id="error-container">
                <span class="error-icon">⚠️</span>
                <span id="error-text">Please enter a valid past date.</span>
            </div>
        </section>

        <footer class="app-footer">
            <div class="creator-info">
                <p class="creator-name">zahiya</p>
                <a href="mailto:kittukhan864@gmail.com" class="creator-email">kittukhan864@gmail.com</a>
            </div>
            <a href="https://digitalheroesco.com" target="_blank" rel="noopener noreferrer" class="btn btn-hero" id="hero-btn">Built for Digital Heroes</a>
        </footer>
    </main>

    <!-- Main JavaScript -->
    <script src="script.js"></script>
</body>
</html>
